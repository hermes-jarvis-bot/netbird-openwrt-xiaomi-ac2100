name: Build OpenWrt package

on:
  workflow_dispatch:
    inputs:
      profile:
        description: OpenWrt device profile to validate
        required: false
        default: xiaomi_mi-router-ac2100
  push:
    branches:
      - master
    paths:
      - package/**
      - scripts/**
      - .github/workflows/build.yml
      - .github/workflows/check-netbird-release.yml
      - README.md

permissions:
  contents: read

jobs:
  build:
    name: Build netbird ipk / OpenWrt ${{ matrix.openwrt_version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        openwrt_version:
          - 24.10.0
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
          - 24.10.6
          - 24.10.7

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install SDK prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            gawk \
            gettext \
            git \
            jq \
            libncurses-dev \
            python3 \
            rsync \
            unzip \
            wget \
            zstd

      - name: Build package
        env:
          OPENWRT_VERSION: ${{ matrix.openwrt_version }}
          PROFILE: ${{ inputs.profile || 'xiaomi_mi-router-ac2100' }}
        run: ./scripts/build-sdk.sh

      - name: Collect artifacts
        run: |
          mkdir -p "dist/${{ matrix.openwrt_version }}"
          find build -name 'netbird_*.ipk' -exec cp -f {} "dist/${{ matrix.openwrt_version }}/" \;
          test -n "$(find "dist/${{ matrix.openwrt_version }}" -name 'netbird_*.ipk' -print -quit)"
          sha256sum "dist/${{ matrix.openwrt_version }}"/*.ipk | tee "dist/${{ matrix.openwrt_version }}/SHA256SUMS"
          file "dist/${{ matrix.openwrt_version }}"/*.ipk | tee "dist/${{ matrix.openwrt_version }}/FILEINFO.txt"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: netbird-openwrt-${{ matrix.openwrt_version }}-ipk
          path: |
            dist/${{ matrix.openwrt_version }}/*.ipk
            dist/${{ matrix.openwrt_version }}/SHA256SUMS
            dist/${{ matrix.openwrt_version }}/FILEINFO.txt
          if-no-files-found: error
