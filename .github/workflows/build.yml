name: Build OpenWrt package

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: OpenWrt release version
        required: false
        default: 24.10.0
      profile:
        description: OpenWrt device profile to validate
        required: false
        default: xiaomi_mi-router-ac2100
  push:
    branches:
      - master
    paths:
      - package/**
      - scripts/**
      - .github/workflows/build.yml
      - README.md

permissions:
  contents: read

jobs:
  build:
    name: Build netbird ipk
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install SDK prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            gawk \
            gettext \
            git \
            jq \
            libncurses-dev \
            python3 \
            rsync \
            unzip \
            wget \
            zstd

      - name: Build package
        env:
          OPENWRT_VERSION: ${{ inputs.openwrt_version || '24.10.0' }}
          PROFILE: ${{ inputs.profile || 'xiaomi_mi-router-ac2100' }}
        run: ./scripts/build-sdk.sh

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find build -name 'netbird_*.ipk' -exec cp -f {} dist/ \;
          test -n "$(find dist -name 'netbird_*.ipk' -print -quit)"
          sha256sum dist/*.ipk | tee dist/SHA256SUMS
          file dist/*.ipk | tee dist/FILEINFO.txt

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: netbird-openwrt-ipk
          path: |
            dist/*.ipk
            dist/SHA256SUMS
            dist/FILEINFO.txt
          if-no-files-found: error
