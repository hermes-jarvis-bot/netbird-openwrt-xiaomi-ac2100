name: Check NetBird release and publish package

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

concurrency:
  group: netbird-release-watcher
  cancel-in-progress: false

jobs:
  build-release:
    name: Release OpenWrt ${{ matrix.openwrt_version }} package
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        openwrt_version:
          - 24.10.0
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
          - 24.10.6
          - 24.10.7
    env:
      PROFILE: xiaomi_mi-router-ac2100
      RELEASE_WORKTREE: ../release-worktree-${{ matrix.openwrt_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install SDK prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            gawk \
            gettext \
            git \
            jq \
            libncurses-dev \
            python3 \
            rsync \
            unzip \
            wget \
            zstd

      - name: Resolve latest NetBird release
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(gh api repos/netbirdio/netbird/releases/latest --jq .tag_name)"
          version="${tag#v}"
          {
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"
          echo "Latest NetBird: ${tag}"

      - name: Prepare detached release worktree
        run: |
          rm -rf "$RELEASE_WORKTREE"
          git worktree add --detach "$RELEASE_WORKTREE" HEAD

      - name: Update package metadata in worktree
        working-directory: ${{ env.RELEASE_WORKTREE }}
        run: ./scripts/update-netbird-version.sh "${{ steps.latest.outputs.tag }}"

      - name: Resolve package release metadata
        id: package
        working-directory: ${{ env.RELEASE_WORKTREE }}
        env:
          OPENWRT_VERSION: ${{ matrix.openwrt_version }}
        run: |
          version="$(sed -n 's/^PKG_VERSION:=//p' package/netbird/Makefile)"
          package_release="$(sed -n 's/^PKG_RELEASE:=//p' package/netbird/Makefile)"
          release_tag="netbird-${version}-r${package_release}-openwrt-${OPENWRT_VERSION}"
          {
            echo "version=${version}"
            echo "package_release=${package_release}"
            echo "release_tag=${release_tag}"
          } >> "$GITHUB_OUTPUT"
          echo "OpenWrt package release tag: ${release_tag}"

      - name: Check whether OpenWrt release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists: $RELEASE_TAG"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release does not exist yet: $RELEASE_TAG"
          fi

      - name: Stop if package release already exists
        if: steps.existing.outputs.exists == 'true'
        run: echo "Nothing to do. Latest NetBird package release already exists for OpenWrt ${{ matrix.openwrt_version }}."

      - name: Build package in worktree
        if: steps.existing.outputs.exists != 'true'
        working-directory: ${{ env.RELEASE_WORKTREE }}
        env:
          OPENWRT_VERSION: ${{ matrix.openwrt_version }}
          PROFILE: ${{ env.PROFILE }}
        run: ./scripts/build-sdk.sh

      - name: Collect release artifacts
        if: steps.existing.outputs.exists != 'true'
        working-directory: ${{ env.RELEASE_WORKTREE }}
        run: |
          mkdir -p dist
          find build -name 'netbird_*.ipk' -exec cp -f {} dist/ \;
          test -n "$(find dist -name 'netbird_*.ipk' -print -quit)"
          sha256sum dist/*.ipk | tee dist/SHA256SUMS
          file dist/*.ipk | tee dist/FILEINFO.txt
          ls -lah dist

      - name: Create GitHub release
        if: steps.existing.outputs.exists != 'true'
        working-directory: ${{ env.RELEASE_WORKTREE }}
        env:
          GH_TOKEN: ${{ github.token }}
          OPENWRT_VERSION: ${{ matrix.openwrt_version }}
          RELEASE_TAG: ${{ steps.package.outputs.release_tag }}
          NETBIRD_TAG: ${{ steps.latest.outputs.tag }}
          VERSION: ${{ steps.package.outputs.version }}
          PACKAGE_RELEASE: ${{ steps.package.outputs.package_release }}
        run: |
          cat > release-notes.md.in <<'EOF'
          NetBird ${NETBIRD_TAG} package for OpenWrt ${OPENWRT_VERSION}.

          Target: ramips/mt7621
          Profile validated: ${PROFILE}
          OpenWrt package architecture: mipsel_24kc
          Package release: r${PACKAGE_RELEASE}

          Install on router:

          ```sh
          opkg update
          opkg install ca-bundle kmod-wireguard
          opkg install ./netbird_${VERSION}-r${PACKAGE_RELEASE}_mipsel_24kc.ipk
          ```

          Use package feeds matching OpenWrt ${OPENWRT_VERSION}, especially for kmod-wireguard.
          Verify checksums with the attached SHA256SUMS file.
          EOF

          sed 's/^          //' release-notes.md.in | envsubst > release-notes.md

          gh release create "$RELEASE_TAG" \
            --title "NetBird ${NETBIRD_TAG} r${PACKAGE_RELEASE} for OpenWrt ${OPENWRT_VERSION}" \
            --notes-file release-notes.md \
            dist/*.ipk dist/SHA256SUMS dist/FILEINFO.txt

  commit-metadata:
    name: Commit NetBird metadata after successful matrix
    runs-on: ubuntu-24.04
    needs: build-release
    if: always() && needs.build-release.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve latest NetBird release
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(gh api repos/netbirdio/netbird/releases/latest --jq .tag_name)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Latest NetBird: ${tag}"

      - name: Update package metadata
        run: ./scripts/update-netbird-version.sh "${{ steps.latest.outputs.tag }}"

      - name: Commit metadata bump if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No metadata changes to commit."
          else
            git add package/netbird/Makefile README.md
            git commit -m "Update NetBird package metadata to ${{ steps.latest.outputs.tag }}"
            git push origin HEAD:master
          fi
